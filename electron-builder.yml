appId: com.cyberpunk2073.vam-backstage
productName: VaM Backstage
icon: resources/icon.png
directories:
  buildResources: build
# Whitelist: only our bundled output + assets. Include patterns suppress the
# default `**/*`, so nothing else in the repo root (VaM/, docs/, test/, …) is
# swept in. package.json and the production node_modules tree are added anyway.
files:
  - out/**
  - resources/**
asarUnpack:
  - resources/**
  # @parcel/watcher loads its native .node binary at runtime via
  # `require('@parcel/watcher-<platform>-<arch>/watcher.node')`. asar packs
  # the .js wrapper but the .node has to be unpacked to be dlopen-able.
  - node_modules/@parcel/watcher-*/**
win:
  executableName: vam-backstage
nsis:
  artifactName: vam-backstage-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  artifactName: vam-backstage-${arch}-mac.${ext}
  # No Apple Developer cert: opt into ad-hoc signing explicitly and apply the
  # entitlements (incl. disable-library-validation) to both the main app and
  # every nested component so the hardened-runtime bundle actually launches.
  identity: '-'
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: vam-backstage.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Utility
appImage:
  artifactName: vam-backstage.${ext}
deb:
  artifactName: vam-backstage_${arch}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: cyberpunk2073
  repo: vam-backstage
