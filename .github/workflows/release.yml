name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

  build:
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: npm run build && npx electron-builder --linux AppImage deb --publish never
          - os: windows-latest
            build_cmd: npm run build:win -- --publish never
          - os: macos-latest
            build_cmd: npm run build:mac -- --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Build installers
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/latest*.yml
            dist/*.blockmap
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
          if-no-files-found: error

  publish:
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.zip
            release-assets/*.blockmap
            release-assets/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
